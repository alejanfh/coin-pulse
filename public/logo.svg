<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="xGradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="textGradient" x1="44" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <linearGradient id="xAccent" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c4b5fd" />
    </linearGradient>
  </defs>

  <!-- X shape — two crossing rounded bars -->
  <line x1="6" y1="6" x2="34" y2="34" stroke="url(#xGradient)" stroke-width="7" stroke-linecap="round"/>
  <line x1="34" y1="6" x2="6" y2="34" stroke="url(#xAccent)" stroke-width="7" stroke-linecap="round"/>

  <!-- Small pulse dot on X center -->
  <circle cx="20" cy="20" r="3.5" fill="#0f0f14"/>
  <circle cx="20" cy="20" r="2" fill="url(#xGradient)"/>

  <!-- Wordmark: "Ale" light + "X" bold gradient -->
  <text
    x="46"
    y="26"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="300"
    letter-spacing="-0.5"
    fill="url(#textGradient)"
  >Ale</text>
  <text
    x="83"
    y="26"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#xGradient)"
  >X</text>
</svg>